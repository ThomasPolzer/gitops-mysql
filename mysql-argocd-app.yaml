apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mysql-deployment
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-username/mysql-k8s  # Änder dies zu deinem Git Repo
    targetRevision: HEAD
    path: mysql
  destination:
    server: https://kubernetes.default.svc
    namespace: mysql
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
